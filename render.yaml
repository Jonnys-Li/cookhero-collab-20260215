services:
  - type: web
    name: cookhero-backend
    runtime: python
    plan: free
    autoDeploy: true
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: RATE_LIMIT_ENABLED
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        value: "https://frontend-one-gray-39.vercel.app,http://localhost:5173"
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: RAG_INIT_ON_STARTUP
        value: "false"
      - key: MCP_STARTUP_TIMEOUT_SECONDS
        value: "15"
      - key: METADATA_CACHE_TIMEOUT_SECONDS
        value: "20"
      - key: OPENAI_IMAGE_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: FAST_LLM_API_KEY
        sync: false
      - key: VISION_API_KEY
        sync: false
      - key: WEB_SEARCH_API_KEY
        sync: false
      - key: AMAP_API_KEY
        sync: false
      - key: MCP_DIET_SERVICE_KEY
        value: "cookhero-mcp-demo-key-v1"
