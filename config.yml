# config.yml
# Main configuration file for the CookHero RAG system.
# Sensitive keys (like API keys) should be stored in a separate .env file.

paths:
  base_data_path: "data/HowToCook"

vector_store:
  # Type of vector store, for future extensibility (e.g., "chroma", "faiss")
  type: "milvus"
  host: "localhost"
  port: 19530
  collection_names:
    recipes: "cook_hero_recipes"
    tips: "cook_hero_tips"
    generic_text: "cook_hero_generic_text"

embedding:
  # Local embedding model only
  model_name: "BAAI/bge-small-zh-v1.5"

llm:
  # Model name for the language model
  model_name: "deepseek-ai/DeepSeek-R1-0528-Qwen3-8B"
  # Optional base URL for self-hosted or proxy endpoints
  base_url: "https://api.siliconflow.cn/v1"
  # Generation parameters
  temperature: 0
  max_tokens: 131072

retrieval:
  # Number of documents to retrieve
  top_k: 9
  # RRF k parameter (deprecated, kept for backward compatibility)
  rrf_k: 60
  # Minimum score threshold for filtering low-quality results (0.0 = no filtering)
  score_threshold: 0.1
  # Ranker type: "rrf" (Reciprocal Rank Fusion) or "weighted" (weighted combination)
  ranker_type: "weighted"
  # Weights for [dense_vector, sparse_bm25] when using weighted ranker
  ranker_weights: [0.8, 0.2]

reranker:
  # Whether to enable the reranking step
  enabled: true
  # Type of reranker to use. Currently only 'siliconflow' is supported.
  type: "siliconflow"
  # Model for reranking. Must be a model compatible with the /rerank endpoint.
  model_name: "BAAI/bge-reranker-v2-m3"
  # Score threshold for filtering documents. Documents with a score below this will be discarded.
  score_threshold: 0.1
  base_url: "https://api.siliconflow.cn/v1/rerank"
  temperature: 0.0
  max_tokens: 32768

cache:
  # Whether to enable caching
  enabled: true
  # Redis configuration
  redis_host: "localhost"
  redis_port: 6379
  redis_db: 0
  redis_password: null  # Set in .env file if needed
  # Cache TTL (time-to-live) in seconds
  retrieval_ttl: 1800  # 30 minutes for retrieval results
  response_ttl: 3600   # 1 hour for query responses
  # L2 semantic cache settings
  l2_enabled: true
  similarity_threshold: 0.8  # Minimum similarity for L2 cache matching (0-1)

data_source:
  # Settings specific to the HowToCook data source
  howtocook:
    path_suffix: "dishes"
    headers_to_split_on:
      - ["#", "header_1"]
      - ["##", "header_2"]
  # Settings specific to the Tips data source
  tips:
    path_suffix: "tips"
    headers_to_split_on:
      - ["#", "header_1"]
      - ["##", "header_2"]
  # Settings specific to the Generic Text data source
  generic_text:
    path_suffix: "generic_text" # Assumes text files are in data/generic_text/
    window_size: 3 # Window size for Sentence Window Indexing (3 sentences before and after)
