# config.yml
# ============================================================================
# CookHero Configuration
# ============================================================================
# This file contains the main configuration for the CookHero RAG system.
# Sensitive values (API keys, passwords) should be stored in .env file.
#
# Configuration is organized as:
# 1. Common configurations (shared across modules)
# 2. Module-specific configurations (may override common settings)
# ============================================================================

# ----------------------------------------------------------------------------
# Common LLM Provider Configuration (Layered: fast / normal)
# ----------------------------------------------------------------------------
# fast: optimized for low latency (intent detection, query rewriting, etc.)
# normal: optimized for quality (final response generation, complex reasoning)
#
# Each profile supports:
#   - model_names: list of models (one will be randomly selected per call)
#   - base_url, api_key (api_key loaded from .env: LLM_API_KEY / FAST_LLM_API_KEY)
#   - temperature, max_tokens
llm:
  fast:
    model_names:
      # - "XiaomiMiMo/MiMo-V2-Flash"
      # - "XiaomiMiMo/MiMo-V2-Flash"
      - "Qwen/Qwen3-Next-80B-A3B-Instruct"
      - "Qwen/Qwen3-Coder-480B-A35B-Instruct"
    base_url: "https://api-inference.modelscope.cn/v1"
    # api_key: loaded from .env (FAST_LLM_API_KEY or LLM_API_KEY)
    temperature: 1
    max_tokens: 131072

  normal:
    model_names:
      - "deepseek-ai/DeepSeek-R1-0528-Qwen3-8B"
      - "Qwen/Qwen3-VL-30B-A3B-Instruct"
      - "Qwen/Qwen2.5-7B-Instruct"
    base_url: "https://api.siliconflow.cn/v1"
    # api_key: loaded from .env (LLM_API_KEY)
    temperature: 1
    max_tokens: 131072

# ----------------------------------------------------------------------------
# Data Paths
# ----------------------------------------------------------------------------
paths:
  base_data_path: "data/HowToCook"

# ----------------------------------------------------------------------------
# Embedding Model
# ----------------------------------------------------------------------------
embedding:
  model_name: "BAAI/bge-small-zh-v1.5"

# ----------------------------------------------------------------------------
# Vector Store (Milvus)
# ----------------------------------------------------------------------------
vector_store:
  type: "milvus"
  collection_names:
    recipes: "cook_hero_recipes"
    "personal": "cook_hero_personal_docs"

# ----------------------------------------------------------------------------
# Retrieval Pipeline
# ----------------------------------------------------------------------------
retrieval:
  top_k: 9
  score_threshold: 0.2
  ranker_type: "weighted"  # "rrf" or "weighted"
  ranker_weights: [0.8, 0.2]  # [dense_vector, sparse_bm25]

# ----------------------------------------------------------------------------
# Reranker
# ----------------------------------------------------------------------------
# Uses the common LLM API key by default (can override with RERANKER_API_KEY in .env)
reranker:
  enabled: true
  type: "siliconflow"
  model_name: "Qwen/Qwen3-Reranker-8B"
  base_url: "https://api.siliconflow.cn/v1/rerank"
  # api_key: loaded from .env (RERANKER_API_KEY)
  temperature: 0.0
  max_tokens: 8192
  score_threshold: 0.2

# ----------------------------------------------------------------------------
# Cache Configuration
# ----------------------------------------------------------------------------
# Cache strategy:
# - L1: Exact match (Redis) - fast lookup for identical queries
# - L2: Semantic match (Milvus) - handles similar queries via vector similarity
#
# Only caches: Query -> Retrieved Documents (Context)
# Does NOT cache: LLM responses
cache:
  enabled: true
  # TTL and high-level cache settings. Connection details are moved to
  # the `database.redis` and `database.milvus` sections below.
  # Cache TTL (applies to both L1 and L2)
  ttl: 3600  # 1 hour
  # L2 semantic cache
  l2_enabled: true
  similarity_threshold: 0.92
  vector_collection: "cookhero_retrieval_cache"
  vector_collection: "cookhero_retrieval_cache"
  # vector_user/vector_password: loaded from .env

# ----------------------------------------------------------------------------
# Web Search (Tavily)
# ----------------------------------------------------------------------------
web_search:
  # Enable/disable web search feature
  enabled: true
  # api_key: loaded from .env (WEB_SEARCH_API_KEY)
  # Maximum number of search results to return
  max_results: 5

# ----------------------------------------------------------------------------
# Database (PostgreSQL)
# ----------------------------------------------------------------------------
database:
  # PostgreSQL primary database
  postgres:
    host: "localhost"
    port: 5432
    database: "cookhero"
    user: "cookhero"
    # password: loaded from .env (DATABASE_PASSWORD)
    pool_size: 20
    max_overflow: 30
    pool_timeout: 30
    pool_recycle: 1800
    echo: false

  # Redis (L1 cache) connection details
  redis:
    host: "localhost"
    port: 6379
    db: 0
    # password: loaded from .env (REDIS_PASSWORD)

  # Milvus (vector database) connection details
  milvus:
    host: "localhost"
    port: 19530
    # user/password: loaded from .env (MILVUS_USER / MILVUS_PASSWORD)
    # secure: false

# ----------------------------------------------------------------------------
# Data Sources
# ----------------------------------------------------------------------------
data_source:
  howtocook:
    path_suffix: "dishes"
    tips_path_suffix: "tips"
    headers_to_split_on:
      - ["#", "header_1"]
      - ["##", "header_2"]
