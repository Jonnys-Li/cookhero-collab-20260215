name: Cloud Config Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloud-config-sync
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      should_sync: ${{ steps.plan.outputs.should_sync }}
      skip_reason: ${{ steps.plan.outputs.skip_reason }}
      missing: ${{ steps.plan.outputs.missing }}
    steps:
      - id: plan
        name: Decide Whether To Sync
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          MCP_DIET_SERVICE_KEY: ${{ secrets.MCP_DIET_SERVICE_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_SERVICE_NAME: ${{ secrets.RENDER_SERVICE_NAME }}
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=non_main" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing=()
          [[ -z "${RENDER_API_KEY}" ]] && missing+=("RENDER_API_KEY")
          [[ -z "${MCP_DIET_SERVICE_KEY}" ]] && missing+=("MCP_DIET_SERVICE_KEY")
          if [[ -z "${RENDER_SERVICE_ID}" && -z "${RENDER_SERVICE_NAME}" ]]; then
            missing+=("RENDER_SERVICE_ID|RENDER_SERVICE_NAME")
          fi

          if (( ${#missing[@]} > 0 )); then
            missing_csv="$(IFS=,; echo "${missing[*]}")"
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=missing_secrets" >> "$GITHUB_OUTPUT"
            echo "missing=${missing_csv}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_sync=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=ok" >> "$GITHUB_OUTPUT"
          echo "missing=" >> "$GITHUB_OUTPUT"

  sync-render-mcp-key:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [plan]
    if: ${{ needs.plan.outputs.should_sync == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure sync script is executable
        run: chmod +x scripts/sync-render-env.sh

      - name: Sync Render env and verify MCP endpoint
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_SERVICE_NAME: ${{ secrets.RENDER_SERVICE_NAME }}
          MCP_DIET_SERVICE_KEY: ${{ secrets.MCP_DIET_SERVICE_KEY }}
          BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
        run: ./scripts/sync-render-env.sh --trigger-deploy --wait-seconds 720 --poll-interval-seconds 10

  skipped-cloud-sync:
    runs-on: ubuntu-latest
    needs: [plan]
    if: ${{ needs.plan.outputs.should_sync != 'true' }}
    steps:
      - name: Report Skip Reason
        run: |
          if [[ "${{ needs.plan.outputs.skip_reason }}" == "non_main" ]]; then
            echo "::notice::Cloud config sync is restricted to main. Current ref=${GITHUB_REF}. Skipping."
            exit 0
          fi

          if [[ "${{ needs.plan.outputs.skip_reason }}" == "missing_secrets" ]]; then
            echo "::warning::Cloud config sync skipped because required secrets are missing."
            echo "::warning::Missing: ${{ needs.plan.outputs.missing }}"
            echo "::warning::Required: RENDER_API_KEY, MCP_DIET_SERVICE_KEY, and one of RENDER_SERVICE_ID or RENDER_SERVICE_NAME."
            exit 0
          fi

          echo "::notice::Cloud config sync skipped. reason=${{ needs.plan.outputs.skip_reason }}."
