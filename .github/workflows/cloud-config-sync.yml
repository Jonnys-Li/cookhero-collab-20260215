name: Cloud Config Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloud-config-sync
  cancel-in-progress: false

jobs:
  sync-render-mcp-key:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.MCP_DIET_SERVICE_KEY != '' && (secrets.RENDER_SERVICE_ID != '' || secrets.RENDER_SERVICE_NAME != '') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure sync script is executable
        run: chmod +x scripts/sync-render-env.sh

      - name: Sync Render env and verify MCP endpoint
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_SERVICE_NAME: ${{ secrets.RENDER_SERVICE_NAME }}
          MCP_DIET_SERVICE_KEY: ${{ secrets.MCP_DIET_SERVICE_KEY }}
          BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
        run: ./scripts/sync-render-env.sh --trigger-deploy --wait-seconds 360 --poll-interval-seconds 10

  missing-cloud-sync-secrets:
    runs-on: ubuntu-latest
    if: ${{ !(secrets.RENDER_API_KEY != '' && secrets.MCP_DIET_SERVICE_KEY != '' && (secrets.RENDER_SERVICE_ID != '' || secrets.RENDER_SERVICE_NAME != '')) }}
    steps:
      - name: Report missing required secrets
        run: |
          echo "::warning::Cloud config sync skipped because required secrets are missing."
          echo "::warning::Required: RENDER_API_KEY, MCP_DIET_SERVICE_KEY, and one of RENDER_SERVICE_ID or RENDER_SERVICE_NAME."
