name: Production Smoke Test

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Every 6 hours (UTC). Keep this light to avoid burning Actions quota.
    - cron: "0 */6 * * *"

permissions:
  contents: read

concurrency:
  group: prod-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure smoke script is executable
        run: chmod +x scripts/smoke-prod.sh

      - name: Run production smoke tests
        env:
          FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          MCP_SERVICE_KEY: ${{ secrets.MCP_DIET_SERVICE_KEY }}
          SMOKE_STRICT: "true"
          MAX_RETRIES: "3"
          CONNECT_TIMEOUT_SECONDS: "8"
          REQUEST_TIMEOUT_SECONDS: "90"
          ROUTE_GUARD_WAIT_SECONDS: "900"
          ROUTE_GUARD_POLL_SECONDS: "15"
        run: ./scripts/smoke-prod.sh
