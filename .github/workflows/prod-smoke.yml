name: Production Smoke Test

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: prod-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure smoke script is executable
        run: chmod +x scripts/smoke-prod.sh

      - name: Run production smoke tests
        env:
          FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: ./scripts/smoke-prod.sh
